limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

map $http_x_request_id $coachos_request_id {
    default $http_x_request_id;
    "" $request_id;
}

server {
    listen 8080;
    server_name _;
    client_max_body_size 2g;

    location = /health/live {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"nginx"}';
    }

    location = /nginx_status {
        access_log off;
        stub_status;
    }

    location /auth-api/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://auth-service:8000/;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-Request-ID $coachos_request_id;
    }

    location /athlete-api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://athlete-service:8000/;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-Request-ID $coachos_request_id;
    }

    location /media-api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://media-service:8000/;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-Request-ID $coachos_request_id;
    }

    location /ai-review-api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ai-review-service:8000/;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-Request-ID $coachos_request_id;
    }

    # Browser uploads use a presigned MinIO URL on the same public origin.
    location /coachos-videos/ {
        proxy_pass http://minio:9000;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:8080;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-Request-ID $coachos_request_id;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
