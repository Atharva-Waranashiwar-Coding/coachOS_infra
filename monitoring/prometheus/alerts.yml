groups:
  - name: coachos
    rules:
      - alert: CoachOSServiceDown
        expr: up{job=~"coachos-services|coachos-nginx"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CoachOS target {{ $labels.instance }} is down"

      - alert: CoachOSHighServerErrorRate
        expr: |
          (
            sum by (service) (rate(coachos_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum by (service) (rate(coachos_http_requests_total[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} server error rate exceeds 5%"

      - alert: CoachOSHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(coachos_http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} p95 latency exceeds one second"

      - alert: CoachOSPostgresDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter {{ $labels.instance }} reports unavailable"
