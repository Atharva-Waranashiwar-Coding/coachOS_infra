global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: coachos-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:8000
          - athlete-service:8000
          - media-service:8000
          - ai-review-service:8000

  - job_name: coachos-nginx
    static_configs:
      - targets:
          - frontend-exporter:9113
          - nginx-exporter:9113

  - job_name: coachos-postgres
    static_configs:
      - targets:
          - auth-db-exporter:9187
          - athlete-db-exporter:9187
          - media-db-exporter:9187
          - ai-review-db-exporter:9187

  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]
