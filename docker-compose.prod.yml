name: coachos

x-api-security: &api-security
  restart: always
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop: [ALL]
  security_opt: ["no-new-privileges:true"]
  networks: [coachos-public, coachos-internal, coachos-data]

x-worker-security: &worker-security
  restart: always
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop: [ALL]
  security_opt: ["no-new-privileges:true"]
  networks: [coachos-internal, coachos-data]

x-postgres-common: &postgres-common
  image: postgres:16-alpine
  restart: always
  networks: [coachos-data]
  shm_size: 256mb
  security_opt: ["no-new-privileges:true"]

services:
  auth-db:
    <<: *postgres-common
    environment:
      POSTGRES_DB: coachos_auth
      POSTGRES_USER: coachos_auth
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes: [auth-db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos_auth -d coachos_auth"]
      interval: 10s
      timeout: 5s
      retries: 20

  athlete-db:
    <<: *postgres-common
    environment:
      POSTGRES_DB: coachos_athlete
      POSTGRES_USER: coachos_athlete
      POSTGRES_PASSWORD: ${ATHLETE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes: [athlete-db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos_athlete -d coachos_athlete"]
      interval: 10s
      timeout: 5s
      retries: 20

  media-db:
    <<: *postgres-common
    environment:
      POSTGRES_DB: coachos_media
      POSTGRES_USER: coachos_media
      POSTGRES_PASSWORD: ${MEDIA_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes: [media-db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos_media -d coachos_media"]
      interval: 10s
      timeout: 5s
      retries: 20

  ai-review-db:
    <<: *postgres-common
    environment:
      POSTGRES_DB: coachos_ai_review
      POSTGRES_USER: coachos_ai_review
      POSTGRES_PASSWORD: ${AI_REVIEW_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes: [ai-review-db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos_ai_review -d coachos_ai_review"]
      interval: 10s
      timeout: 5s
      retries: 20

  auth-service:
    <<: *api-security
    image: ${AUTH_IMAGE}
    environment:
      APP_NAME: coachos-auth-service
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://coachos_auth:${AUTH_DB_PASSWORD}@auth-db:5432/coachos_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${COACHOS_SCHEME}://${COACHOS_DOMAIN}
      LOG_LEVEL: INFO
      METRICS_ENABLED: "true"
      REQUEST_ID_HEADER: X-Request-ID
      RUN_MIGRATIONS: "true"
      INTERNAL_SERVICE_TOKENS: '{"athlete-service":"${ATHLETE_TO_AUTH_TOKEN}"}'
      ATHLETE_SERVICE_INTERNAL_URL: http://athlete-service:8000
      INTERNAL_SERVICE_NAME: auth-service
      INTERNAL_SERVICE_TOKEN: ${AUTH_TO_ATHLETE_TOKEN}
      ATHLETE_INVITATION_BASE_URL: ${COACHOS_SCHEME}://${COACHOS_DOMAIN}/invitations/accept
      ALLOW_DEV_INVITATION_URL_RESPONSE: "false"
    depends_on:
      auth-db: {condition: service_healthy}
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 512M}

  athlete-service:
    <<: *api-security
    image: ${ATHLETE_IMAGE}
    environment:
      APP_NAME: coachos-athlete-service
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://coachos_athlete:${ATHLETE_DB_PASSWORD}@athlete-db:5432/coachos_athlete
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${COACHOS_SCHEME}://${COACHOS_DOMAIN}
      LOG_LEVEL: INFO
      METRICS_ENABLED: "true"
      REQUEST_ID_HEADER: X-Request-ID
      RUN_MIGRATIONS: "true"
      AUTH_SERVICE_INTERNAL_URL: http://auth-service:8000
      AI_REVIEW_SERVICE_URL: http://ai-review-service:8000
      AI_REVIEW_SERVICE_INTERNAL_URL: http://ai-review-service:8000
      MEDIA_SERVICE_INTERNAL_URL: http://media-service:8000
      INTERNAL_SERVICE_NAME: athlete-service
      INTERNAL_SERVICE_TOKEN: ${ATHLETE_TO_AUTH_TOKEN}
      INTERNAL_SERVICE_TOKENS: '{"auth-service":"${AUTH_TO_ATHLETE_TOKEN}","media-service":"${MEDIA_TO_ATHLETE_TOKEN}","ai-review-service":"${AI_TO_ATHLETE_TOKEN}"}'
    depends_on:
      athlete-db: {condition: service_healthy}
      auth-service: {condition: service_healthy}
    deploy:
      resources:
        limits: {cpus: "1.5", memory: 768M}

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    restart: always
    networks: [coachos-internal, coachos-data]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: [minio-data:/data]
    security_opt: ["no-new-privileges:true"]

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    networks: [coachos-data]
    depends_on:
      minio: {condition: service_started}
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done &&
        mc mb --ignore-existing local/coachos-videos &&
        mc anonymous set none local/coachos-videos
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  media-service:
    <<: *api-security
    image: ${MEDIA_IMAGE}
    environment:
      APP_NAME: coachos-media-service
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://coachos_media:${MEDIA_DB_PASSWORD}@media-db:5432/coachos_media
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${COACHOS_SCHEME}://${COACHOS_DOMAIN}
      LOG_LEVEL: INFO
      METRICS_ENABLED: "true"
      REQUEST_ID_HEADER: X-Request-ID
      RUN_MIGRATIONS: "true"
      ATHLETE_SERVICE_URL: http://athlete-service:8000
      ATHLETE_SERVICE_INTERNAL_URL: http://athlete-service:8000
      INTERNAL_SERVICE_NAME: media-service
      INTERNAL_SERVICE_TOKEN: ${MEDIA_TO_ATHLETE_TOKEN}
      INSIGHT_INTERNAL_SERVICE_TOKEN: ${ATHLETE_TO_MEDIA_TOKEN}
      TIMELINE_PUBLISHING_ENABLED: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: coachos-videos
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      media-db: {condition: service_healthy}
      athlete-service: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
    deploy:
      resources:
        limits: {cpus: "1.5", memory: 768M}

  media-outbox-worker:
    <<: *worker-security
    image: ${MEDIA_IMAGE}
    command: ["python", "-m", "app.workers.outbox_publisher"]
    environment:
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql+psycopg://coachos_media:${MEDIA_DB_PASSWORD}@media-db:5432/coachos_media
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ATHLETE_SERVICE_URL: http://athlete-service:8000
      ATHLETE_SERVICE_INTERNAL_URL: http://athlete-service:8000
      INTERNAL_SERVICE_NAME: media-service
      INTERNAL_SERVICE_TOKEN: ${MEDIA_TO_ATHLETE_TOKEN}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: coachos-videos
      S3_ENDPOINT_URL: http://minio:9000
      TIMELINE_PUBLISHING_ENABLED: "true"
      LOG_LEVEL: INFO
    depends_on:
      media-service: {condition: service_healthy}

  ai-review-service:
    <<: *api-security
    image: ${AI_REVIEW_IMAGE}
    environment:
      APP_NAME: coachos-ai-review-service
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://coachos_ai_review:${AI_REVIEW_DB_PASSWORD}@ai-review-db:5432/coachos_ai_review
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${COACHOS_SCHEME}://${COACHOS_DOMAIN}
      LOG_LEVEL: INFO
      METRICS_ENABLED: "true"
      REQUEST_ID_HEADER: X-Request-ID
      RUN_MIGRATIONS: "true"
      ATHLETE_SERVICE_URL: http://athlete-service:8000
      ATHLETE_SERVICE_INTERNAL_URL: http://athlete-service:8000
      MEDIA_SERVICE_URL: http://media-service:8000
      INTERNAL_SERVICE_NAME: ai-review-service
      INTERNAL_SERVICE_TOKEN: ${AI_TO_ATHLETE_TOKEN}
      INSIGHT_INTERNAL_SERVICE_TOKEN: ${ATHLETE_TO_AI_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      ai-review-db: {condition: service_healthy}
      athlete-service: {condition: service_healthy}
      media-service: {condition: service_healthy}
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}

  ai-review-worker:
    <<: *worker-security
    image: ${AI_REVIEW_IMAGE}
    command: ["python", "-m", "app.workers.review_worker"]
    environment: &ai-worker-environment
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql+psycopg://coachos_ai_review:${AI_REVIEW_DB_PASSWORD}@ai-review-db:5432/coachos_ai_review
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ATHLETE_SERVICE_URL: http://athlete-service:8000
      ATHLETE_SERVICE_INTERNAL_URL: http://athlete-service:8000
      MEDIA_SERVICE_URL: http://media-service:8000
      INTERNAL_SERVICE_NAME: ai-review-service
      INTERNAL_SERVICE_TOKEN: ${AI_TO_ATHLETE_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LOG_LEVEL: INFO
    depends_on:
      ai-review-service: {condition: service_healthy}

  ai-review-outbox-worker:
    <<: *worker-security
    image: ${AI_REVIEW_IMAGE}
    command: ["python", "-m", "app.workers.outbox_publisher"]
    environment: *ai-worker-environment
    depends_on:
      ai-review-service: {condition: service_healthy}

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: always
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    networks: [coachos-public]

  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    networks: [coachos-public]
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-common.conf:/etc/nginx/proxy-common.conf:ro
      - ./nginx/tls:/etc/nginx/tls:ro
    depends_on:
      frontend: {condition: service_healthy}
      auth-service: {condition: service_healthy}
      athlete-service: {condition: service_healthy}
      media-service: {condition: service_healthy}
      ai-review-service: {condition: service_healthy}

  frontend-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.1
    command: ["--nginx.scrape-uri=http://frontend:8080/nginx_status"]
    restart: always
    networks: [coachos-public, monitoring]
    depends_on: [frontend]

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.1
    command: ["--nginx.scrape-uri=http://nginx:8080/nginx_status"]
    restart: always
    networks: [coachos-public, monitoring]
    depends_on: [nginx]

  auth-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: always
    networks: [coachos-data, monitoring]
    environment:
      DATA_SOURCE_NAME: postgresql://coachos_auth:${AUTH_DB_PASSWORD}@auth-db:5432/coachos_auth?sslmode=disable
    depends_on:
      auth-db: {condition: service_healthy}

  athlete-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: always
    networks: [coachos-data, monitoring]
    environment:
      DATA_SOURCE_NAME: postgresql://coachos_athlete:${ATHLETE_DB_PASSWORD}@athlete-db:5432/coachos_athlete?sslmode=disable
    depends_on:
      athlete-db: {condition: service_healthy}

  media-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: always
    networks: [coachos-data, monitoring]
    environment:
      DATA_SOURCE_NAME: postgresql://coachos_media:${MEDIA_DB_PASSWORD}@media-db:5432/coachos_media?sslmode=disable
    depends_on:
      media-db: {condition: service_healthy}

  ai-review-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: always
    networks: [coachos-data, monitoring]
    environment:
      DATA_SOURCE_NAME: postgresql://coachos_ai_review:${AI_REVIEW_DB_PASSWORD}@ai-review-db:5432/coachos_ai_review?sslmode=disable
    depends_on:
      ai-review-db: {condition: service_healthy}

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: always
    networks: [coachos-public, monitoring]
    ports: ["127.0.0.1:9090:9090"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.5.1
    command: ["-config.file=/etc/loki/config.yml"]
    restart: always
    networks: [monitoring]
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.5.1
    command: ["-config.file=/etc/promtail/config.yml"]
    restart: always
    networks: [monitoring]
    read_only: true
    tmpfs: ["/tmp:size=32m,mode=1777"]
    security_opt: ["no-new-privileges:true"]
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]

  grafana:
    image: grafana/grafana:12.0.2
    restart: always
    networks: [monitoring]
    ports: ["127.0.0.1:3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus, loki]

networks:
  coachos-public:
  coachos-internal:
    internal: true
  coachos-data:
    internal: true
  monitoring:
    internal: true

volumes:
  auth-db-data:
  athlete-db-data:
  media-db-data:
  ai-review-db-data:
  minio-data:
  prometheus-data:
  loki-data:
  grafana-data:
